name: Build and Release APK + Windows MSI + iOS Framework

on:
  push:
    tags:
      - 'v*'  # 当推送 v 开头的 tag 时触发

permissions:
  contents: write  # 授予创建 Release 的权限

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle Wrapper
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: ~/.android/build-cache
          key: ${{ runner.os }}-android-sdk

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew :androidApp:assembleRelease --build-cache --parallel

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: androidApp/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Rename APK
        run: |
          mv ${{ steps.sign_app.outputs.signedReleaseFile }} androidApp/build/outputs/apk/release/MyCalendar-${{ github.ref_name }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: androidApp/build/outputs/apk/release/MyCalendar-${{ github.ref_name }}.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle Wrapper
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}

      - name: Build Windows MSI
        run: .\gradlew.bat :composeApp:packageMsi --no-daemon

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: composeApp/build/compose/binaries/main/msi/*.msi

  build-ios:
    runs-on: macos-14
    continue-on-error: true  # Room KSP 可能失败，不阻塞 Release
    env:
      GRADLE_OPTS: -Xmx6g -XX:MaxMetaspaceSize=512m  # Kotlin/Native 编译 iOS 需较大堆内存
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('gradle/**', '**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build iOS XCFramework (Debug)
        run: ./gradlew :composeApp:assembleComposeAppDebugXCFramework --no-daemon

      - name: Package iOS XCFramework
        run: |
          XCFRAMEWORK="composeApp/build/XCFrameworks/debug/composeApp.xcframework"
          if [ ! -d "$XCFRAMEWORK" ]; then
            echo "XCFramework not found at $XCFRAMEWORK, listing:"
            find composeApp/build -name "*.xcframework" -type d 2>/dev/null || true
            exit 1
          fi
          cd composeApp/build/XCFrameworks/debug && zip -r ../../../../ios-frameworks-${{ github.ref_name }}.zip composeApp.xcframework && cd -
          ls -la ios-frameworks-${{ github.ref_name }}.zip

      - name: Upload iOS Framework artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-frameworks
          path: ios-frameworks-${{ github.ref_name }}.zip

  release:
    needs: [build-apk, build-windows, build-ios]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -name "*.apk" -exec cp {} release/ \;
          MSI=$(find artifacts -name "*.msi" | head -1)
          [ -n "$MSI" ] && cp "$MSI" "release/MyCalendar-${{ github.ref_name }}.msi"
          [ -d artifacts/ios-frameworks ] && cp artifacts/ios-frameworks/*.zip release/MyCalendar-${{ github.ref_name }}-ios-frameworks.zip 2>/dev/null || true
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

